<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoRaro's Dojo</title>
  <style>
    * {
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4a 100%);
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    body.light-mode {
      background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      color: #1e1e2f;
    }
    
    body.light-mode .container {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    
    body.light-mode h1 {
      color: #6366f1;
      text-shadow: 0 2px 10px rgba(99,102,241,0.3);
    }
    
    body.light-mode .highlight {
      color: #7c3aed;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
      background: rgba(40, 40, 80, 0.6);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    
    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #a5b4fc;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(165,180,252,0.4);
      transition: all 0.3s ease;
    }
    
    .avatar:hover {
      transform: scale(1.08) rotate(5deg);
      border-color: #c084fc;
      box-shadow: 0 8px 30px rgba(192,132,252,0.5);
    }
    
    h1 {
      font-size: 3rem;
      margin: 0 0 20px;
      color: #a5b4fc;
      text-shadow: 0 2px 10px rgba(165,180,252,0.4);
    }
    
    p {
      font-size: 1.3rem;
      line-height: 1.6;
      margin: 0 0 30px;
    }
    
    .highlight {
      color: #c084fc;
      font-weight: bold;
    }
    
    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #7c3aed;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.2rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.5);
    }
    
    .btn-secondary {
      background: transparent;
      border: 2px solid #a5b4fc;
      color: #a5b4fc;
    }
    
    .btn-secondary:hover {
      background: #a5b4fc;
      color: #1e1e2f;
      box-shadow: 0 8px 25px rgba(165,180,252,0.4);
    }
    
    body.light-mode .btn-secondary {
      border-color: #6366f1;
      color: #6366f1;
    }
    
    body.light-mode .btn-secondary:hover {
      background: #6366f1;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <img 
      src="https://api.dicebear.com/7.x/bottts/svg?seed=CryptoRaro&backgroundColor=a5b4fc" 
      alt="CryptoRaro Avatar" 
      class="avatar"
    >
    
    <h1>Hello, I'm CryptoRaro 🌌</h1>
    
    <p>Welcome to my cozy corner of the internet.<br>
      Here we build things, learn cool stuff, and vibe in the dojo.</p>
    
    <p class="highlight">Currently dreaming in code & exploring the blockchain universe.</p>
    
    <div class="buttons">
      <a href="https://x.com/CryptoRaro" class="btn" target="_blank">Find me on X →</a>
      
      <button class="btn btn-secondary" onclick="toggleTheme()">
        🌓 Toggle Theme
      </button>
    </div>
    
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
    }
  </script>
  
</body>
</html>
