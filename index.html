<!DOCTYPE html>
<html lang="en" class="light"> <!-- default to light; JS will adjust -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="CryptoRaro's Dojo – Cozy corner for coding, learning, blockchain vibes and building in the universe 🌌"/>
  
  <!-- Open Graph for better X / social previews -->
  <meta property="og:title" content="CryptoRaro's Dojo"/>
  <meta property="og:description" content="Building things, learning cool stuff, vibing in code & exploring blockchain 🌌"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://cr-682.vercel.app/"/>
  
  <!-- Emoji favicon – no extra file needed -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>">
  
  <title>CryptoRaro's Dojo</title>
  
  <!-- AOS CSS (stable v2.3.4 from jsDelivr / cdnjs) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" integrity="sha256-1cK78a1KyZRiowuRCWwctRAbGwZzwhA/0+AUO9q1xw=" crossorigin="anonymous"/>
  
  <style>
    :root {
      --bg: #f8f9fa;
      --text: #121212;
      --accent: #00d4ff;
      --glow: rgba(0, 212, 255, 0.6);
    }
    body.dark {
      --bg: #0a0a1f;
      --text: #e0e0ff;
      --accent: #00ffff;
      --glow: rgba(0, 255, 255, 0.5);
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e1e3f);
      color: var(--text);
      transition: background 0.5s ease, color 0.5s ease;
      min-height: 100vh;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
      text-align: center;
    }
    h1, h2 {
      margin: 1rem 0;
      text-shadow: 0 0 20px var(--glow);
    }
    h1 {
      font-size: 3.5rem;
      animation: glow 3s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px var(--glow); }
      to   { text-shadow: 0 0 30px var(--glow), 0 0 60px var(--glow); }
    }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
    button {
      margin-top: 2rem;
      padding: 0.8rem 1.8rem;
      font-size: 1.1rem;
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid var(--accent);
      color: var(--text);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: rgba(0, 212, 255, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
    }
    @media (prefers-color-scheme: dark) {
      body.light { /* override if user prefers dark but forced light */ }
    }
  </style>
</head>
<body>

  <div class="container">
    <section data-aos="fade-up" data-aos-duration="900">
      <h1>CryptoRaro's Dojo</h1>
    </section>

    <section data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">
      <h2>Hello, I'm CryptoRaro <span role="img" aria-label="universe">🌌</span></h2>
      <p>Welcome to my cozy corner of the internet.</p>
      <p>Here we build things, learn cool stuff, and vibe in the dojo.</p>
      <p>Currently dreaming in code & exploring the blockchain universe.</p>
    </section>

    <section data-aos="fade-right" data-aos-delay="400" data-aos-duration="800">
      <p><a href="https://x.com/CryptoRaro" target="_blank" rel="noopener noreferrer">Find me on X →</a></p>
    </section>

    <button id="theme-toggle" data-aos="zoom-in" data-aos-delay="600">
      Toggle Theme 🌓
    </button>
  </div>

  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" integrity="sha256-Z2oX3a08y+iyG2kS2+6p4/8G2r6v5f9pI6F3aL8g==" crossorigin="anonymous"></script>
  
  <script>
    // AOS initialization
    AOS.init({
      duration: 800,
      easing: 'ease-out',
      once: true,          // animate only once
      offset: 80           // start a bit earlier
    });

    // Theme handling
    const toggleButton = document.getElementById('theme-toggle');
    const body = document.body;

    // Detect system preference on load
    if (!localStorage.getItem('theme')) {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        body.classList.add('dark');
        body.classList.remove('light');
      } else {
        body.classList.add('light');
        body.classList.remove('dark');
      }
    } else {
      body.classList.add(localStorage.getItem('theme'));
      body.classList.remove(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark');
    }

    // Toggle & save preference
    toggleButton.addEventListener('click', () => {
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        body.classList.add('light');
        localStorage.setItem('theme', 'light');
      } else {
        body.classList.remove('light');
        body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    });
  </script>
</body>
</html>
  </script>
  
</body>
</html>
