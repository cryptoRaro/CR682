<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Market Trades and Trends</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" crossorigin="anonymous"/>
  <style>
    :root {
      --bg: #0f172a;
      --text: #f1f5f9;
      --accent: #3b82f6;
      --positive: #22c55e;
      --negative: #ef4444;
      --surface: #1e293b;
      --border: #334155;
    }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    header { text-align: center; padding: 3rem 0; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 1.5rem; 
    }
    .card { 
      background: var(--surface); 
      border-radius: 1rem; 
      padding: 1.5rem; 
      border: 1px solid var(--border); 
    }
    .price-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .price-icon { width: 48px; height: 48px; border-radius: 50%; }
    .price-symbol { font-size: 1.5rem; font-weight: 600; }
    .price-value { font-size: 2rem; font-weight: 700; }
    .error-box { 
      grid-column: 1 / -1; 
      text-align: center; 
      padding: 3rem 1rem; 
      background: rgba(239,68,68,0.1); 
      border-radius: 1rem; 
      color: #ef4444; 
    }
  </style>
</head>
<body>

  <header class="container">
    <h1>Crypto Market Trades and Trends</h1>
  </header>

  <main class="container">
    <section>
      <h2>Live Prices</h2>
      <div id="prices-container" class="grid">
        <div>Loading prices...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" crossorigin="anonymous"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    const container = document.getElementById('prices-container');
    const coins = [
      { id: 'bitcoin',          symbol: 'BTC' },
      { id: 'ethereum',         symbol: 'ETH' },
      { id: 'solana',           symbol: 'SOL' },
      { id: 'xrp',              symbol: 'XRP' },
      { id: 'dogecoin',         symbol: 'DOGE' },
      { id: 'pudgy-penguins',   symbol: 'PENGU' }
    ];

    const icons = {
      bitcoin: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=035',
      ethereum: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=035',
      solana: 'https://cryptologos.cc/logos/solana-sol-logo.svg?v=035',
      xrp: 'https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=035',
      dogecoin: 'https://cryptologos.cc/logos/dogecoin-doge-logo.svg?v=035',
      'pudgy-penguins': 'https://cryptologos.cc/logos/pudgy-penguins-pengu-logo.svg?v=035'
    };

    async function loadPrices() {
      try {
        console.log('Fetching prices...');
        const ids = coins.map(c => c.id).join(',');
        const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`;
        const res = await fetch(url);
        
        if (!res.ok) {
          throw new Error(`API returned ${res.status}`);
        }

        const data = await res.json();
        console.log('API data received:', data);

        container.innerHTML = '';

        coins.forEach(coin => {
          const d = data[coin.id];
          if (!d) {
            console.warn(`No data for ${coin.id}`);
            return;
          }

          const price = d.usd.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
          const change = d.usd_24h_change?.toFixed(2) ?? '–';
          const cls = Number(change) >= 0 ? 'change-positive' : 'change-negative';

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="price-header">
              <img src="${icons[coin.id]}" alt="${coin.symbol}" class="price-icon">
              <div>
                <div class="price-symbol">${coin.symbol}</div>
                <div class="price-value">${price}</div>
              </div>
            </div>
            <div>24h: <span class="${cls}">${change}%</span></div>
          `;
          container.appendChild(card);
        });

        console.log('Prices rendered successfully');
      } catch (err) {
        console.error('Price load failed:', err);
        container.innerHTML = `
          <div class="error-box">
            Could not load prices right now.<br>
            Error: ${err.message}<br>
            <button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:#2563eb;color:white;border:none;border-radius:0.5rem;cursor:pointer;">
              Retry
            </button>
          </div>
        `;
      }
    }

    loadPrices();
    setInterval(loadPrices, 60000);
  </script>
</body>
</html>
