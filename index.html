<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Crypto Market Trades and Trends – Live prices, charts, news & crypto insights"/>
  <title>Crypto Market Trades and Trends</title>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Pirata One for title -->
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" crossorigin="anonymous"/>

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --positive: #16a34a;
      --negative: #dc2626;
      --border: #e5e7eb;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
    }
    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --border: #334155;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
    header { padding: 5rem 0 3rem; text-align: center; }
    h1 {
      font-family: 'Pirata One', cursive;
      font-size: clamp(3rem, 8vw, 5.5rem);
      margin-bottom: 1rem;
    }
    .lead { font-size: 1.2rem; color: var(--muted); max-width: 600px; margin: 0 auto 2rem; }
    section { padding: 5rem 0; }
    h2 { font-size: 2.25rem; text-align: center; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-4px); }
    .price-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .price-icon { width: 48px; height: 48px; border-radius: 50%; }
    .price-symbol { font-size: 1.4rem; font-weight: 600; }
    .price-value { font-size: 1.9rem; font-weight: 700; }
    .change-positive { color: var(--positive); }
    .change-negative { color: var(--negative); }
    #chart-container { height: 480px; border-radius: 1rem; overflow: hidden; border: 1px solid var(--border); background: var(--surface); margin: 2rem 0; }
    .news-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
    }
    .news-title a {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .news-title a:hover { text-decoration: underline; }
    .news-meta { font-size: 0.9rem; color: var(--muted); margin-top: 0.5rem; }
    #theme-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    #theme-toggle:hover { background: var(--accent); color: white; }
    @media (max-width: 768px) {
      header { padding: 4rem 0 2rem; }
      h1 { font-size: 2.8rem; }
      h2 { font-size: 2rem; }
      #chart-container { height: 360px; }
    }
  </style>
</head>
<body>

  <header class="container">
    <h1>Crypto Market Trades and Trends</h1>
    <p class="lead">Live prices, charts, news & crypto insights</p>
  </header>

  <main class="container">
    <section data-aos="fade-up">
      <h2>Live Prices</h2>
      <div class="grid" id="prices-container">
        <div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:var(--muted);">Loading prices...</div>
      </div>
    </section>

    <section data-aos="fade-up" data-aos-delay="100">
      <h2>Market Chart</h2>
      <div id="chart-container">
        <div id="tv_chart" style="height:100%;width:100%"></div>
      </div>
    </section>

    <section data-aos="fade-up" data-aos-delay="200">
      <h2>Latest Crypto News</h2>
      <div id="news-container" class="grid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:var(--muted);">Loading news...</div>
      </div>
    </section>
  </main>

  <button id="theme-toggle">🌓</button>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" crossorigin="anonymous"></script>
  <script>
    AOS.init({ duration: 700, once: true, offset: 60 });

    // Theme toggle
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;
    let theme = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    body.classList.add(theme);

    toggle.onclick = () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      body.classList.toggle('dark');
      body.classList.toggle('light');
      localStorage.setItem('theme', theme);
    };

    // Live Prices
    const pricesContainer = document.getElementById('prices-container');
    const coins = [
      { id: 'bitcoin', symbol: 'BTC' },
      { id: 'ethereum', symbol: 'ETH' },
      { id: 'solana', symbol: 'SOL' },
      { id: 'xrp', symbol: 'XRP' },
      { id: 'dogecoin', symbol: 'DOGE' },
      { id: 'pudgy-penguins', symbol: 'PENGU' }
    ];

    const icons = {
      bitcoin: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=035',
      ethereum: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=035',
      solana: 'https://cryptologos.cc/logos/solana-sol-logo.svg?v=035',
      xrp: 'https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=035',
      dogecoin: 'https://cryptologos.cc/logos/dogecoin-doge-logo.svg?v=035',
      'pudgy-penguins': 'https://cryptologos.cc/logos/pudgy-penguins-pengu-logo.svg?v=035'
    };

    async function loadPrices() {
      try {
        const ids = coins.map(c => c.id).join(',');
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        if (!res.ok) throw new Error('API error');
        const data = await res.json();

        pricesContainer.innerHTML = '';

        coins.forEach(({ id, symbol }) => {
          const d = data[id];
          if (!d) return;

          const price = d.usd.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
          const change = d.usd_24h_change?.toFixed(2) ?? '–';
          const cls = Number(change) >= 0 ? 'change-positive' : 'change-negative';

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="price-header">
              <img src="${icons[id]}" alt="${symbol}" class="price-icon">
              <div>
                <div class="price-symbol">${symbol}</div>
                <div class="price-value">${price}</div>
              </div>
            </div>
            <div>24h: <span class="${cls}">${change}%</span></div>
          `;
          pricesContainer.appendChild(card);
        });
      } catch (err) {
        pricesContainer.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--negative);">Failed to load prices</div>`;
      }
    }

    loadPrices();
    setInterval(loadPrices, 60000);

    // TradingView chart
    new TradingView.widget({
      width: "100%",
      height: "100%",
      symbol: "BINANCE:BTCUSDT",
      interval: "60",
      timezone: "Etc/UTC",
      theme: document.body.classList.contains('dark') ? "dark" : "light",
      style: "1",
      locale: "en",
      enable_publishing: false,
      allow_symbol_change: true,
      container_id: "tv_chart"
    });

    // Real-time Crypto News (CoinGecko News API)
    const newsContainer = document.getElementById('news-container');
    async function loadNews() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/news');
        if (!res.ok) throw new Error('News API error');
        const data = await res.json();

        newsContainer.innerHTML = '';

        data.data.slice(0, 8).forEach(article => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            ${article.thumb_2x ? `<img src="${article.thumb_2x}" alt="${article.title}" loading="lazy" style="width:100%;height:140px;object-fit:cover;border-radius:0.75rem;margin-bottom:1rem;">` : ''}
            <h3 style="margin:0.5rem 0;">
              <a href="${article.url}" target="_blank" style="color:var(--accent);text-decoration:none;">
                ${article.title}
              </a>
            </h3>
            <p class="news-meta">${article.news_site} • ${new Date(article.published_at).toLocaleDateString()}</p>
          `;
          newsContainer.appendChild(card);
        });
      } catch (err) {
        newsContainer.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--negative);">Failed to load news</div>`;
      }
    }

    loadNews();
    setInterval(loadNews, 15 * 60 * 1000); // 15 minutes
  </script>
</body>
</html>
