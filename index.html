<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Market Trades and Trends</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" crossorigin="anonymous"/>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      margin: 0; 
      padding: 0; 
      background: #0f172a; 
      color: #f1f5f9; 
      min-height: 100vh; 
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; }
    h1, h2 { text-align: center; }
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 1.5rem; 
      margin: 2rem 0; 
    }
    .card { 
      background: #1e293b; 
      border-radius: 1rem; 
      padding: 1.5rem; 
      border: 1px solid #334155; 
    }
    .price-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .price-icon { width: 48px; height: 48px; border-radius: 50%; }
    .price-symbol { font-size: 1.5rem; font-weight: 600; }
    .price-value { font-size: 2rem; font-weight: 700; }
    .change-positive { color: #22c55e; }
    .change-negative { color: #ef4444; }
    #chart-container { height: 500px; background: #1e293b; border-radius: 1rem; overflow: hidden; }
    .x-timeline { max-width: 600px; margin: 0 auto; border-radius: 1rem; overflow: hidden; }
  </style>
</head>
<body>

  <header class="container">
    <h1>Crypto Market Trades and Trends</h1>
  </header>

  <main class="container">
    <!-- Live Prices -->
    <section>
      <h2>Live Prices</h2>
      <div id="prices-container" class="grid">
        <div style="grid-column:1/-1;text-align:center;padding:2rem;">Loading prices...</div>
      </div>
    </section>

    <!-- Chart -->
    <section>
      <h2>Market Chart</h2>
      <div id="chart-container">
        <div id="tv_chart" style="height:100%;width:100%"></div>
      </div>
    </section>

    <!-- X Timeline -->
    <section>
      <h2>Latest from @CryptoRaro</h2>
      <div class="x-timeline">
        <a class="twitter-timeline"
           data-height="550"
           data-theme="dark"
           data-chrome="noheader nofooter noborders transparent"
           href="https://twitter.com/CryptoRaro?ref_src=twsrc%5Etfw">
           Tweets by CryptoRaro
        </a>
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" crossorigin="anonymous"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    // Live Prices
    const container = document.getElementById('prices-container');
    const coins = ['bitcoin','ethereum','solana','xrp','dogecoin'];
    const icons = {
      bitcoin: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=035',
      ethereum: 'https://cryptologos.cc/logos/ethereum-eth-logo.svg?v=035',
      solana: 'https://cryptologos.cc/logos/solana-sol-logo.svg?v=035',
      xrp: 'https://cryptologos.cc/logos/xrp-xrp-logo.svg?v=035',
      dogecoin: 'https://cryptologos.cc/logos/dogecoin-doge-logo.svg?v=035'
    };

    async function loadPrices() {
      try {
        const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coins.join(',')}&vs_currencies=usd&include_24hr_change=true`);
        const data = await res.json();
        container.innerHTML = '';
        coins.forEach(coin => {
          const d = data[coin];
          if (!d) return;
          const p = d.usd.toLocaleString('en-US', {style:'currency',currency:'USD'});
          const ch = d.usd_24h_change?.toFixed(2) ?? '–';
          const cls = Number(ch) >= 0 ? 'change-positive' : 'change-negative';
          const sym = coin.toUpperCase();
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="price-header">
              <img src="${icons[coin]}" alt="${sym}">
              <div>
                <div class="price-symbol">${sym}</div>
                <div class="price-value">${p}</div>
              </div>
            </div>
            <div>24h: <span class="${cls}">${ch}%</span></div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#ef4444;">Could not load prices</div>';
      }
    }
    loadPrices();
    setInterval(loadPrices, 60000);

    // TradingView chart
    new TradingView.widget({
      "width": "100%",
      "height": "100%",
      "symbol": "BINANCE:BTCUSDT",
      "interval": "60",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "container_id": "tv_chart"
    });
  </script>
</body>
</html>
