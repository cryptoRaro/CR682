<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Crypto Market Trades and Trends – Live prices, charts, alerts & real-time crypto insights"/>
  <title>Crypto Market Trades and Trends</title>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Pirata One for title -->
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" crossorigin="anonymous"/>

  <style>
    :root {
      --bg: #ffffff;
      --surface: #f9fafb;
      --text: #111827;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-light: #3b82f6;
      --positive: #16a34a;
      --negative: #dc2626;
      --border: #e5e7eb;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #60a5fa;
      --accent-light: #93c5fd;
      --border: #334155;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    header {
      padding: 6rem 0 4rem;
      text-align: center;
    }

    h1 {
      font-family: 'Pirata One', cursive;
      font-size: clamp(3.8rem, 9vw, 6.5rem);
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }

    .lead {
      font-size: 1.25rem;
      color: var(--text-muted);
      max-width: 700px;
      margin: 0 auto 3rem;
    }

    main > section {
      padding: 6rem 0;
      border-top: 1px solid var(--border);
    }

    main > section:first-child { border-top: none; padding-top: 0; }

    h2 {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.75rem;
      transition: all 0.25s ease;
      box-shadow: var(--shadow-sm);
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-md);
    }

    .alert-form {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2rem 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .alert-form select, .alert-form input[type="number"], .alert-form button {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
    }

    .alert-form button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.25s;
    }

    .alert-form button:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
    }

    .alerts-list {
      margin-top: 2rem;
    }

    .alert-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
    }

    .alert-delete {
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .alert-delete:hover {
      background: #dc2626;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 1rem 2rem;
      border-radius: 1rem;
      box-shadow: var(--shadow-md);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s ease;
      max-width: 90%;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="tsparticles"></div>

  <header class="container">
    <h1>Crypto Market Trades and Trends</h1>
    <p class="lead">Real-time prices, charts, alerts & crypto insights</p>
  </header>

  <main class="container">
    <section data-aos="fade-up">
      <h2>Live Prices</h2>
      <div class="grid" id="prices-container">
        <!-- Prices cards will be inserted here -->
      </div>
    </section>

    <section data-aos="fade-up" data-aos-delay="100">
      <h2>Set Price Alerts</h2>
      <div class="alert-form">
        <select id="alert-coin">
          <option value="bitcoin">Bitcoin (BTC)</option>
          <option value="ethereum">Ethereum (ETH)</option>
          <option value="solana">Solana (SOL)</option>
          <option value="xrp">XRP</option>
          <option value="dogecoin">Dogecoin (DOGE)</option>
          <option value="cardano">Cardano (ADA)</option>
          <!-- Add more from your coins list -->
        </select>
        <select id="alert-direction">
          <option value="above">Above</option>
          <option value="below">Below</option>
        </select>
        <input type="number" id="alert-price" placeholder="Target price (USD)" step="0.01" min="0" required>
        <button id="add-alert">Add Alert</button>
      </div>

      <div class="alerts-list" id="alerts-list"></div>
    </section>

    <section data-aos="fade-up" data-aos-delay="200">
      <h2>Market Overview</h2
